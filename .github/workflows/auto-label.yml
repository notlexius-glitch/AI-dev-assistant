name: Auto Label

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label-issues:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    steps:
      - name: Label issues based on title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const labels = [];

            if (title.includes("bug") || title.includes("fix")) {
              labels.push("type:bug");
            }

            if (
              title.includes("add") ||
              title.includes("feature") ||
              title.includes("enhancement")
            ) {
              labels.push("enhancement");
            }

            if (title.includes("test")) {
              labels.push("type:testing");
            }

            if (title.includes("doc")) {
              labels.push("type:docs");
            }

            if (title.includes("frontend") || title.includes("ui")) {
              labels.push("frontend");
            }

            if (title.includes("backend") || title.includes("api")) {
              labels.push("backend");
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels,
              });
            }

  label-prs:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Label PRs based on files changed
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
